<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMDAC · Panel de Administración</title>
<link rel="icon" href="assets/logo-imdac.png">
<meta name="theme-color" content="#FF2C2C">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#FF2C2C;--rojo-700:#d11f1f;--rojo-50:#fff0f0;
  --negro:#0d0d0d;--gris-900:#1a1a1a;--gris-700:#3d3d3d;--gris-500:#6b6b6b;--gris-300:#c9c9c9;--gris-100:#ededed;
  --base:#f4f4f6;--surface:#ffffff;--line:#e7e7ea;--text:#141414;--muted:#7a7a82;
  --radius:16px;--radius-sm:11px;--shadow:0 2px 14px rgba(13,13,13,.06);--shadow-lg:0 16px 48px rgba(13,13,13,.16);
  --font-display:'Space Grotesk',sans-serif;--font-body:'Plus Jakarta Sans',sans-serif;
}
[data-theme="dark"]{--base:#0d0d0f;--surface:#17171a;--line:#26262b;--text:#f2f2f4;--muted:#8d8d96;--gris-100:#202024;--shadow:0 2px 14px rgba(0,0,0,.4);--shadow-lg:0 16px 48px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--base);color:var(--text);line-height:1.5}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--gris-300);border-radius:8px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#33333a}

#boot{position:fixed;inset:0;background:var(--negro);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#boot.hide{opacity:0;pointer-events:none}
.boot-logo{width:74px;height:74px;border-radius:18px;background:var(--rojo);display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:2rem;color:#fff;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.92);opacity:.7}}

/* LOGIN */
#login{position:fixed;inset:0;z-index:5000;display:grid;grid-template-columns:1.1fr .9fr;background:var(--surface)}
#login.hidden{display:none}
.login-hero{position:relative;background:var(--negro);color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.login-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(255,44,44,.35),transparent 45%);z-index:0}
.login-hero>*{position:relative;z-index:1}
.lh-brand{display:flex;align-items:center;gap:14px}
.lh-brand img{width:52px;height:52px;border-radius:12px;background:#fff;padding:4px}
.lh-brand b{font-family:var(--font-display);font-size:1.5rem;letter-spacing:.06em}
.lh-brand span{color:var(--rojo)}
.lh-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);line-height:1.02;font-weight:700;margin-top:auto}
.lh-title em{color:var(--rojo);font-style:normal}
.lh-sub{margin-top:18px;max-width:380px;color:#c9c9c9;line-height:1.6}
.lh-foot{margin-top:32px;font-size:.82rem;color:#7a7a82;letter-spacing:.04em;text-transform:uppercase}
.login-form{display:flex;align-items:center;justify-content:center;padding:40px}
.lf-inner{width:100%;max-width:380px}
.lf-badge{display:inline-flex;align-items:center;gap:8px;background:var(--rojo-50);color:var(--rojo);padding:7px 14px;border-radius:50px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px}
.lf-h{font-family:var(--font-display);font-size:1.7rem;font-weight:700;margin-bottom:6px}
.lf-p{color:var(--muted);font-size:.95rem;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:11px;background:var(--base);color:var(--text);font-size:.95rem;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--rojo);background:var(--surface)}
.field textarea{resize:none}
.btn-primary{width:100%;padding:14px;background:var(--rojo);color:#fff;border-radius:11px;font-weight:700;font-size:1rem;transition:transform .15s,box-shadow .15s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(255,44,44,.32)}
.btn-primary:active{transform:translateY(0)}
.lf-err{background:var(--rojo-50);color:var(--rojo-700);padding:11px 14px;border-radius:10px;font-size:.86rem;margin-bottom:16px;display:none;border:1px solid #ffd5d5}
[data-theme="dark"] .lf-err{background:#2a1414;border-color:#4a1f1f}

/* SHELL */
#app{display:none}
body.logged #app{display:block}
.shell{display:flex;min-height:100vh}
.sidebar{width:250px;flex-shrink:0;background:var(--negro);color:#fff;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow-y:auto;z-index:200;transition:transform .3s cubic-bezier(.34,1.4,.4,1)}
.sb-brand{display:flex;align-items:center;gap:11px;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand img{width:40px;height:40px;border-radius:10px;background:#fff;padding:3px}
.sb-brand .bn{font-family:var(--font-display);font-weight:700;font-size:1.12rem}
.sb-brand .bn span{color:var(--rojo)}
.sb-brand .bs{font-size:.64rem;color:#8d8d96;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:14px 12px}
.sb-item{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:11px;color:#b5b5bd;font-weight:500;font-size:.93rem;cursor:pointer;margin-bottom:3px;transition:.16s}
.sb-item svg{width:19px;height:19px;flex-shrink:0;stroke-width:1.8}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:var(--rojo);color:#fff}
.sb-foot{border-top:1px solid rgba(255,255,255,.08);padding:14px}
.sb-user{display:flex;align-items:center;gap:11px;padding:6px}
.sb-user .av{width:36px;height:36px;border-radius:10px;background:var(--rojo);color:#fff;display:grid;place-items:center;font-weight:700;font-family:var(--font-display);flex-shrink:0}
.sb-user .nm{font-weight:600;font-size:.85rem;line-height:1.2}
.sb-user .em{font-size:.72rem;color:#8d8d96;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{display:flex;align-items:center;gap:13px;padding:10px 13px;border-radius:11px;color:#b5b5bd;font-weight:500;font-size:.9rem;width:100%;margin-top:6px;transition:.16s}
.sb-logout:hover{background:rgba(255,44,44,.15);color:#ff6b6b}
.sb-logout svg{width:18px;height:18px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 30px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
.tb-menu{display:none}
.tb-title{font-family:var(--font-display);font-weight:700;font-size:1.05rem}
.tb-spacer{flex:1}
.tb-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--gris-500);border:1px solid var(--line);background:var(--surface);transition:.16s}
.tb-btn:hover{color:var(--text);border-color:var(--gris-300)}
.tb-btn svg{width:19px;height:19px;stroke-width:1.8}
.content{padding:28px 30px 50px;max-width:1400px;width:100%}
.section{display:none;animation:fade .3s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.page-h{font-family:var(--font-display);font-size:1.8rem;font-weight:700}
.page-sub{color:var(--muted);margin-top:2px}
.btn-add{display:inline-flex;align-items:center;gap:8px;background:var(--rojo);color:#fff;padding:11px 20px;border-radius:11px;font-weight:700;font-size:.92rem;transition:transform .15s,box-shadow .15s}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(255,44,44,.3)}
.btn-add svg{width:17px;height:17px;stroke-width:2.4}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.stat .top{display:flex;align-items:center;justify-content:space-between}
.stat .si{width:42px;height:42px;border-radius:11px;background:var(--rojo-50);color:var(--rojo);display:grid;place-items:center}
[data-theme="dark"] .stat .si{background:#2a1414}
.stat .si svg{width:21px;height:21px;stroke-width:1.8}
.stat b{font-family:var(--font-display);font-size:2rem;font-weight:700;display:block;margin-top:14px;line-height:1}
.stat span{color:var(--muted);font-size:.88rem}
.stat .delta{font-size:.78rem;font-weight:700;color:#16a34a}

/* TABLE */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:.9rem;min-width:600px}
table.tbl th{text-align:left;padding:14px 18px;background:var(--gris-100);font-family:var(--font-display);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;white-space:nowrap}
table.tbl td{padding:14px 18px;border-bottom:1px solid var(--line);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:var(--base)}
.t-title{font-weight:600;font-family:var(--font-display)}
.t-thumb{width:54px;height:38px;border-radius:7px;background:var(--gris-100) center/cover;flex-shrink:0}
.t-cell{display:flex;align-items:center;gap:12px}
.tag{display:inline-block;padding:4px 11px;border-radius:50px;font-size:.72rem;font-weight:700;background:var(--rojo-50);color:var(--rojo);white-space:nowrap}
[data-theme="dark"] .tag{background:#2a1414}
.tag.gray{background:var(--gris-100);color:var(--muted)}
.tag.green{background:#e8f9ee;color:#16a34a}
[data-theme="dark"] .tag.green{background:#0f2417}
.row-actions{display:flex;gap:8px;justify-content:flex-end}
.ico-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;border:1px solid var(--line);color:var(--gris-500);transition:.16s}
.ico-btn:hover{border-color:var(--gris-300);color:var(--text)}
.ico-btn.del:hover{border-color:var(--rojo);color:var(--rojo);background:var(--rojo-50)}
[data-theme="dark"] .ico-btn.del:hover{background:#2a1414}
.ico-btn svg{width:16px;height:16px;stroke-width:1.9}
.empty{text-align:center;padding:54px 20px;color:var(--muted)}
.empty b{display:block;color:var(--text);font-family:var(--font-display);font-size:1.05rem;margin-bottom:6px}
.pager{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid var(--line)}
.pager button{padding:7px 14px;border:1px solid var(--line);border-radius:8px;font-weight:600;font-size:.85rem}
.pager button:hover:not(:disabled){border-color:var(--rojo);color:var(--rojo)}
.pager button:disabled{opacity:.4;cursor:not-allowed}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(13,13,13,.55);backdrop-filter:blur(3px);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);max-width:600px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:scale(.92) translateY(14px);opacity:0;transition:transform .28s cubic-bezier(.34,1.4,.4,1),opacity .25s}
.modal-bg.open .modal{transform:scale(1) translateY(0);opacity:1}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--line)}
.modal-head h3{font-family:var(--font-display);font-size:1.25rem;font-weight:700}
.modal-x{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);transition:.16s}
.modal-x:hover{background:var(--base);color:var(--text)}
.modal-body{padding:26px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.modal-foot{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-ghost{padding:12px 22px;border:1.5px solid var(--line);border-radius:11px;font-weight:600;transition:.16s}
.btn-ghost:hover{border-color:var(--gris-300)}
.btn-save{padding:12px 26px;background:var(--rojo);color:#fff;border-radius:11px;font-weight:700;transition:transform .15s}
.btn-save:hover{transform:translateY(-2px)}

/* CLASES EDITOR */
.clase-edit{display:flex;gap:8px;align-items:center;background:var(--base);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;overflow:hidden}
.clase-edit input{padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;background:var(--surface);color:var(--text);font-size:.88rem;min-width:0}
.clase-edit .in-titulo{flex:2}
.clase-edit .in-dur{width:84px;flex:none}
.clase-edit .in-url{flex:2}
.clase-edit .num{width:28px;height:28px;border-radius:7px;background:var(--rojo);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.clase-edit .rm{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--rojo);flex-shrink:0}
.clase-edit .rm:hover{background:var(--rojo-50)}
.btn-add-clase{display:inline-flex;align-items:center;gap:7px;color:var(--rojo);font-weight:600;font-size:.9rem;margin-top:4px}

/* DETALLE MIEMBRO */
.member-hero{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.member-hero .av{width:64px;height:64px;border-radius:16px;background:var(--rojo);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:1.6rem}
.member-info{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.member-info .it{background:var(--base);border:1px solid var(--line);border-radius:10px;padding:14px}
.member-info .it .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
.member-info .it .v{font-weight:600;margin-top:4px}

/* CONFIG */
.cfg-item{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.cfg-item:last-child{border:none}
.cfg-item .ci-t b{font-family:var(--font-display);font-weight:600;display:block}
.cfg-item .ci-t span{color:var(--muted);font-size:.86rem}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0;cursor:pointer;display:inline-block}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle .tk{position:absolute;inset:0;background:var(--gris-300);border-radius:50px;transition:.2s}
.toggle .tk::before{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle input:checked + .tk{background:var(--rojo)}
.toggle input:checked + .tk::before{transform:translateX(20px)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--negro);color:#fff;padding:13px 18px 13px 16px;border-radius:14px;font-weight:600;z-index:4000;box-shadow:var(--shadow-lg);transition:transform .35s cubic-bezier(.34,1.4,.4,1);font-size:.9rem;display:flex;align-items:center;gap:12px;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .tic{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.8rem;font-weight:700;flex-shrink:0;color:#fff}
.toast .tic.ok{background:#16a34a}
.toast .tic.err{background:var(--rojo)}
.toast .tic.info{background:#3b82f6}
.toast .undo{margin-left:6px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:.82rem;transition:.16s}
.toast .undo:hover{background:rgba(255,255,255,.26)}
.btn-save:disabled{opacity:.7;cursor:not-allowed;transform:none}
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap}
.emoji-pick button{width:46px;height:46px;border-radius:11px;border:1.5px solid var(--line);font-size:1.3rem;transition:.16s}
.emoji-pick button.active{border-color:var(--rojo);background:var(--rojo-50)}
[data-theme="dark"] .emoji-pick button.active{background:#2a1414}

/* TOOLBAR: búsqueda + filtros */
.search-admin{display:flex;align-items:center;gap:11px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:11px 16px;margin-bottom:14px;max-width:460px}
.search-admin svg{width:18px;height:18px;color:var(--muted)}
.search-admin input{flex:1;border:none;background:none;font-family:inherit;font-size:.92rem;color:var(--text);outline:none}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:7px 15px;border-radius:50px;border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:.82rem;color:var(--muted);transition:.16s}
.chip:hover{border-color:var(--gris-300);color:var(--text)}
.chip.active{background:var(--rojo);border-color:var(--rojo);color:#fff}
.cat-tag{display:inline-flex;align-items:center;gap:8px;padding:7px 8px 7px 14px;border-radius:50px;background:var(--gris-100);font-weight:600;font-size:.84rem}
.cat-tag button{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;color:var(--muted);font-size:.7rem;transition:.16s}
.cat-tag button:hover{background:var(--rojo);color:#fff}
/* grip de arrastre */
.clase-edit{cursor:default}
.clase-edit .grip{cursor:grab;color:var(--gris-300);font-size:1.1rem;user-select:none;padding:0 2px}
.clase-edit .grip:active{cursor:grabbing}
.clase-edit.dragging{opacity:.4}
/* VISTA PREVIA */
.pv-hero{display:grid;grid-template-columns:1fr 1.2fr;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
.pv-img{background:var(--gris-100) center/cover;min-height:150px}
.pv-body{padding:20px}
.pv-cat{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--rojo)}
.pv-body h3{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin:6px 0 8px;line-height:1.1}
.pv-desc{color:var(--muted);font-size:.88rem;line-height:1.5;margin-bottom:12px}
.pv-progress{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--negro),var(--gris-900));color:#fff;border-radius:12px;padding:14px 20px}
.pv-progress span{font-family:var(--font-display);font-weight:600;font-size:.9rem;white-space:nowrap}
.pv-progress .pv-bar{flex:1;height:7px;background:rgba(255,255,255,.18);border-radius:50px;overflow:hidden}
.pv-progress .pv-bar i{display:block;height:100%;background:var(--rojo)}
.pv-progress b{font-family:var(--font-display);color:var(--rojo)}
.pv-clase{display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:11px;padding:13px 16px;margin-bottom:10px}
.pv-cnum{width:34px;height:34px;border-radius:50%;border:2px solid var(--rojo);color:var(--rojo);display:grid;place-items:center;font-weight:700;font-family:var(--font-display);font-size:.85rem;flex-shrink:0}
.pv-clase b{font-family:var(--font-display);font-size:.95rem}
.pv-play{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;color:var(--rojo);font-size:.8rem;flex-shrink:0}
@media(max-width:560px){.pv-hero{grid-template-columns:1fr}}

@media(max-width:900px){
  #login{grid-template-columns:1fr}.login-hero{display:none}
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .tb-menu{display:grid}
  .form-grid,.member-info{grid-template-columns:1fr}
  .content,.topbar{padding-left:18px;padding-right:18px}
  .sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
  .sb-backdrop.open{display:block}
}
</style>
</head>
<body>
<div id="boot"><div class="boot-logo">I</div></div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div class="login-hero">
    <div class="lh-brand"><img src="assets/logo-imdac.png" alt="IMDAC"><div><b>IM<span>DAC</span></b></div></div>
    <div>
      <h1 class="lh-title">Panel de<br><em>administración</em>.</h1>
      <p class="lh-sub">Gestiona cursos, webinars, miembros y todo el contenido del Club IMDAC desde un solo lugar.</p>
    </div>
    <div class="lh-foot">Instituto Mexicano de Arquitectura y Construcción</div>
  </div>
  <div class="login-form">
    <div class="lf-inner">
      <div class="lf-badge">🔒 Acceso restringido</div>
      <h2 class="lf-h">Iniciar sesión</h2>
      <p class="lf-p">Solo personal autorizado de IMDAC.</p>
      <div class="lf-err" id="auth-err"></div>
      <div class="field"><label>Correo de administrador</label><input type="email" id="li-email" placeholder="admin@imdac.mx"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar al panel</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app"><div class="shell">
  <div class="sb-backdrop" id="sb-backdrop" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><img src="assets/logo-imdac.png" alt="IMDAC"><div><div class="bn">IM<span>DAC</span></div><div class="bs">Panel Admin</div></div></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <div class="sb-user"><div class="av" id="u-av">A</div><div style="min-width:0"><div class="nm" id="u-name">Admin</div><div class="em" id="u-email">—</div></div></div>
      <button class="sb-logout" onclick="doLogout()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Cerrar sesión</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="tb-btn tb-menu" onclick="toggleSidebar(true)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div class="tb-title" id="tb-title">Dashboard</div>
      <div class="tb-spacer"></div>
      <button class="tb-btn" onclick="toggleTheme()" id="theme-btn" title="Modo oscuro"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div></div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div id="modal-content"></div></div></div>
<div class="toast" id="toast"></div>
